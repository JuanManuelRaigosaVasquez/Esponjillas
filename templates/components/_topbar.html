<header class="bg-white border-b border-[#d1c5ab]/30 flex items-center justify-between w-full px-6 py-3 sticky top-0 z-30">
    <div class="flex items-center gap-4">
        <button class="rail-toggle md:hidden p-2 rounded-lg hover:bg-[#e5eeff] transition-colors" id="railToggle" aria-label="Menu">
            <span class="material-symbols-outlined text-[#745b00]">menu</span>
        </button>
        <h1 class="text-xl font-bold font-headline text-[#745b00]">Esponjillas Power</h1>
    </div>
    <div class="flex items-center gap-4">
        {% if user.is_authenticated %}
        <div class="flex items-center gap-2 bg-[#e5eeff] pl-1 pr-3 py-1 rounded-full cursor-pointer">
            <div class="w-8 h-8 rounded-full bg-[#f9c80e] flex items-center justify-center text-[#6b5400] font-bold text-sm">
                {{ user.username|slice:":1"|upper }}
            </div>
            <span class="text-sm font-semibold text-[#0b1c30]">{{ user.get_full_name|default:user.username }}</span>
        </div>
        {% endif %}
    </div>
</header>
