{% extends 'base.html' %}
{% block title %}{% if editar %}Editar{% else %}Nuevo{% endif %} Trabajador - Lumina{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'trabajadores:lista' %}" class="p-2 rounded-lg hover:bg-[#e5eeff] transition-colors">
            <span class="material-symbols-outlined text-[#4e4632]">arrow_back</span>
        </a>
        <h2 class="text-2xl font-bold font-headline text-[#0b1c30]">
            {% if editar %}Editar Trabajador{% else %}Nuevo Trabajador{% endif %}
        </h2>
    </div>

    <div class="card p-6">
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-xs font-semibold text-[#4e4632] mb-1 uppercase tracking-wide">Nombre *</label>
                <input type="text" name="nombre" value="{{ trabajador.nombre|default:'' }}" required
                    class="w-full rounded-xl border border-[#d1c5ab] px-4 py-2.5 focus:ring-2 focus:ring-[#f9c80e] focus:border-[#f9c80e] outline-none"
                    placeholder="Ej: Juan">
            </div>

            <div>
                <label class="block text-xs font-semibold text-[#4e4632] mb-1 uppercase tracking-wide">Apellidos</label>
                <input type="text" name="apellidos" value="{{ trabajador.apellidos|default:'' }}"
                    class="w-full rounded-xl border border-[#d1c5ab] px-4 py-2.5 focus:ring-2 focus:ring-[#f9c80e] focus:border-[#f9c80e] outline-none"
                    placeholder="Ej: Perez">
            </div>

            <div>
                <label class="block text-xs font-semibold text-[#4e4632] mb-1 uppercase tracking-wide">Cedula</label>
                <input type="text" name="cedula" value="{{ trabajador.cedula|default:'' }}"
                    class="w-full rounded-xl border border-[#d1c5ab] px-4 py-2.5 focus:ring-2 focus:ring-[#f9c80e] focus:border-[#f9c80e] outline-none"
                    placeholder="Ej: 1234567890">
            </div>

            <div>
                <label class="block text-xs font-semibold text-[#4e4632] mb-1 uppercase tracking-wide">Telefono</label>
                <input type="text" name="telefono" value="{{ trabajador.telefono|default:'' }}"
                    class="w-full rounded-xl border border-[#d1c5ab] px-4 py-2.5 focus:ring-2 focus:ring-[#f9c80e] focus:border-[#f9c80e] outline-none"
                    placeholder="Ej: 3001234567">
            </div>

            <div class="flex items-center gap-3">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" name="activo" {% if trabajador.activo|default:True %}checked{% endif %}
                        class="sr-only peer">
                    <div class="w-10 h-5 bg-gray-300 peer-focus:ring-2 peer-focus:ring-[#f9c80e] rounded-full peer peer-checked:after:translate-x-5 peer-checked:bg-[#f9c80e] after:content-[''] after:absolute after:top-[3px] after:left-[3px] after:bg-white after:rounded-full after:h-3.5 after:w-3.5 after:transition-all"></div>
                </label>
                <span class="text-sm text-[#4e4632]">Activo</span>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit" class="btn-primary flex-1">
                    {% if editar %}Guardar Cambios{% else %}Crear Trabajador{% endif %}
                </button>
                <a href="{% url 'trabajadores:lista' %}" class="btn-outline">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
